<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Château Gourmand</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f6f2ea;
}

/* HEADER */
header{
    background:#111;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
}

/* CONTAINER */
.container{
    max-width:850px;
    margin:auto;
    padding:15px;
}

/* CATEGORY */
h2{
    border-left:5px solid #c9a227;
    padding-left:10px;
    margin-top:25px;
}

/* ITEM */
.item{
    background:white;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.price{
    color:#c9a227;
    font-weight:bold;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.btn{
    flex:1;
    padding:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    border-radius:10px;
}

.call{background:#28a745;}
.map{background:#007bff;}

footer{
    text-align:center;
    padding:15px;
    color:#777;
    font-size:12px;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
    <h1>🏰 Le Château Gourmand</h1>
    <p>Cuisine Française</p>
</header>

<div class="container">

<h2>🥗 Entrées</h2>
<div class="item"><span>Salade César</span><span class="price">8.90€</span></div>
<div class="item"><span>Soupe du Jour</span><span class="price">6.90€</span></div>

<h2>🍖 Plats</h2>
<div class="item"><span>Burger Maison</span><span class="price">15.90€</span></div>
<div class="item"><span>Steak Frites</span><span class="price">18.90€</span></div>

<h2>🍰 Desserts</h2>
<div class="item"><span>Tiramisu</span><span class="price">6.50€</span></div>

<h2>🥤 Boissons</h2>
<div class="item"><span>Coca-Cola</span><span class="price">3.50€</span></div>

<div class="buttons">
    <a class="btn call" href="tel:+33000000000">📞 Appeler</a>
    <a class="btn map" href="https://maps.google.com" target="_blank">📍 Maps</a>
</div>

</div>

<footer>
QR Menu Demo • Loches
</footer>

</body>
</html>
