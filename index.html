
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Château Gourmand</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f1ea;
}

header{
    background:linear-gradient(90deg,#1a1a1a,#3a3a3a);
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
    font-size:28px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:15px;
}

.section-title{
    margin-top:25px;
    font-size:20px;
    border-left:5px solid #c9a227;
    padding-left:10px;
}

.card{
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.price{
    font-weight:bold;
    color:#c9a227;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.btn{
    flex:1;
    padding:12px;
    text-align:center;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.call{
    background:#28a745;
}

.map{
    background:#007bff;
}

footer{
    text-align:center;
    padding:15px;
    margin-top:30px;
    font-size:12px;
    color:#666;
}
</style>
</head>

<body>

<header>
    <h1>🏰 Le Château Gourmand</h1>
    <p>Cuisine Française & Grill</p>
</header>

<div class="container">

    <div class="section-title">🥗 Entrées</div>

    <div class="card">
        <span>Salade César</span>
        <span class="price">8.90€</span>
    </div>

    <div class="card">
        <span>Soupe du Jour</span>
        <span class="price">6.90€</span>
    </div>

    <div class="section-title">🍖 Plats</div>

    <div class="card">
        <span>Burger du Château</span>
        <span class="price">15.90€</span>
    </div>

    <div class="card">
        <span>Steak Frites</span>
        <span class="price">18.90€</span>
    </div>

    <div class="section-title">🍰 Desserts</div>

    <div class="card">
        <span>Tiramisu Maison</span>
        <span class="price">6.50€</span>
    </div>

    <div class="section-title">🥤 Boissons</div>

    <div class="card">
        <span>Coca-Cola</span>
        <span class="price">3.50€</span>
    </div>

    <div class="buttons">
        <a class="btn call" href="tel:+33000000000">📞 Appeler</a>
        <a class="btn map" href="https://maps.google.com" target="_blank">📍 Google Maps</a>
    </div>

</div>

<footer>
QR Menu Demo • Powered by you 😎
</footer>

</body>
</html>
